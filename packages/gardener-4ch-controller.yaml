esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    priority: -10
    then:
      - light.turn_on:
          id: status_leds
          brightness: 100%
          effect: "Status Display"
      - script.execute: beep_startup_ok
      - delay: 10s
      - globals.set:
          id: startup_complete
          value: "true"

logger:

api:

ota:
  - platform: esphome

captive_portal:

web_server:

output:
  - platform: gpio
    pin:
      number: ${pin_beeper}
      inverted: ${beeper_inverted}
    id: beeper_out

globals:
  - id: startup_complete
    type: bool
    restore_value: no
    initial_value: "false"
  - id: sensor_voltage_too_high
    type: float
    restore_value: no
    initial_value: ${sensor_voltage_too_high}
  - id: sensor_voltage_too_low
    type: float
    restore_value: no
    initial_value: ${sensor_voltage_too_low}
  - id: sensor_pct_critical
    type: int
    restore_value: no
    initial_value: ${sensor_pct_critical}

number:
  - platform: template
    name: "Brightness: Main LED"
    id: main_led_brightness
    min_value: 0.05
    max_value: 1.0
    step: 0.05
    optimistic: true
    restore_value: true
    initial_value: ${main_led_brightness_default}

  - platform: template
    name: "Brightness: Sensor LEDs"
    id: sensor_led_brightness
    min_value: 0.05
    max_value: 1.0
    step: 0.05
    optimistic: true
    restore_value: true
    initial_value: ${sensor_led_brightness_default}

  - platform: template
    name: "Voltage: Dry"
    id: dry_v
    min_value: 1.8
    max_value: 3.3
    step: 0.01
    optimistic: true
    restore_value: true
    initial_value: ${dry_voltage_default}

  - platform: template
    name: "Voltage: Wet"
    id: wet_v
    min_value: 0.0
    max_value: 1.5
    step: 0.01
    optimistic: true
    restore_value: true
    initial_value: ${wet_voltage_default}

  - platform: template
    name: "Brightness: Breathing Min"
    id: breathing_min_brightness
    min_value: 0.0
    max_value: 0.8
    step: 0.01
    optimistic: true
    restore_value: true
    initial_value: ${breathing_min_brightness_default}

  - platform: template
    name: "Cycle: Breathing"
    id: breathing_cycle
    min_value: 500
    max_value: 10000
    step: 100
    optimistic: true
    restore_value: true
    initial_value: ${breathing_cycle_default}

  - platform: template
    name: "Cycle: Blink"
    id: blink_cycle
    min_value: 50
    max_value: 1000
    step: 50
    optimistic: true
    restore_value: true
    initial_value: ${blink_cycle_default}

  - platform: template
    name: "Cycle: Slow Blink"
    id: slow_blink_cycle
    min_value: 100
    max_value: 5000
    step: 100
    optimistic: true
    restore_value: true
    initial_value: ${slow_blink_cycle_default}

switch:
  - platform: gpio
    pin: ${pin_valve_1}
    id: valve_1
    name: "Valve 1"
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: ${pin_valve_2}
    id: valve_2
    name: "Valve 2"
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: ${pin_valve_3}
    id: valve_3
    name: "Valve 3"
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: ${pin_valve_4}
    id: valve_4
    name: "Valve 4"
    restore_mode: ALWAYS_OFF

  - platform: template
    name: "Board LED Show Sensor Status"
    id: board_led_show_sensor_status
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Board LED Show Valve Status"
    id: board_led_show_valve_status
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Beeper Enabled"
    id: beeper_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Beeper Night Mute"
    id: beeper_night_mute
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

binary_sensor:
  - platform: gpio
    pin:
      number: ${pin_button}
      mode: INPUT_PULLUP
      inverted: true
    id: node_button
    name: "Node Button"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 30s

  - platform: adc
    pin: ${pin_sensor_1}
    id: sensor_1_v
    name: "Sensor 1 Voltage"
    attenuation: 12db
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5

  - platform: adc
    pin: ${pin_sensor_2}
    id: sensor_2_v
    name: "Sensor 2 Voltage"
    attenuation: 12db
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5

  - platform: adc
    pin: ${pin_sensor_3}
    id: sensor_3_v
    name: "Sensor 3 Voltage"
    attenuation: 12db
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5

  - platform: adc
    pin: ${pin_sensor_4}
    id: sensor_4_v
    name: "Sensor 4 Voltage"
    attenuation: 12db
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5

light:
  - platform: esp32_rmt_led_strip
    id: status_leds
    name: "Status LEDs"
    pin: ${pin_leds}
    num_leds: ${led_count}
    chipset: WS2812
    rgb_order: GRB
    effects:
      - addressable_lambda:
          name: "Status Display"
          update_interval: 50ms
          lambda: |-
            // LED index:
            // 0         = board status
            // 1,3,5,7   = sensors 1-4
            // 2,4,6,8   = valves 1-4

            const int BOARD_LED_IDX = 0;
            const int SENSOR_LED_IDX_START = 1;
            const int SENSOR_LED_IDX_STEP = 2;
            const int VALVE_LED_IDX_START = 2;
            const int VALVE_LED_IDX_STEP = 2;
            const int SENSOR_COUNT = 4;
            const int VALVE_COUNT = 4;

            float TOO_HIGH_V = id(sensor_voltage_too_high);
            float TOO_LOW_V = id(sensor_voltage_too_low);
            float DRY_V = id(dry_v).state;
            float WET_V = id(wet_v).state;

            int SENSOR_PCT_CRITICAL = id(sensor_pct_critical);

            float BREATHING_MIN_BRIGHTNESS = id(breathing_min_brightness).state;

            int BREATHING_CYCLE = (int) id(breathing_cycle).state;
            int BLINK_CYCLE = (int) id(blink_cycle).state;
            int SLOW_BLINK_CYCLE = (int) id(slow_blink_cycle).state;

            uint32_t now = millis();

            float breathe = BREATHING_MIN_BRIGHTNESS + (1 - BREATHING_MIN_BRIGHTNESS) * ((sin(now * 3.1416 / BREATHING_CYCLE) + 1.0) / 2.0);
            bool blink = (now / BLINK_CYCLE) % 2 == 0;
            bool slow_blink = (now / SLOW_BLINK_CYCLE) % 2 == 0;

            auto scale = [](Color c, float b) -> Color {
              return Color(c.r * b, c.g * b, c.b * b);
            };

            auto moisture_pct = [&](float v) -> float {
              float pct = (DRY_V - v) / (DRY_V - WET_V) * 100.0;
              if (pct < 0) pct = 0;
              if (pct > 100) pct = 100;
              return pct;
            };

            auto moisture_color = [&](float pct, int &abnormal) -> Color {
              abnormal = false;

              if (pct >= 90) {
                return Color(80, 120, 255);  // royal blue
              } else if (pct >= 75) {
                return Color(70, 180, 220);  // muted cyan
              } else if (pct >= 60) {
                return Color(90, 220, 110);  // soft green
              } else if (pct >= 45) {
                return Color(200, 230, 80);  // olive-lime
              } else if (pct >= 30) {
                return Color(255, 150, 50);  // amber
              } else if (pct >= SENSOR_PCT_CRITICAL) {
                abnormal = 1;
                return Color(230, 70, 30);  // burnt orange
              } else {
                abnormal = 2;
                return Color(180, 20, 30);  // wine red
              }
            };

            float sensor_values[SENSOR_COUNT] = {
              id(sensor_1_v).state,
              id(sensor_2_v).state,
              id(sensor_3_v).state,
              id(sensor_4_v).state
            };

            bool sensor_fault = false;
            bool critical_dry = false;

            float sensor_b = id(sensor_led_brightness).state;

            for (int i = 0; i < SENSOR_COUNT; i++) {
              float v = sensor_values[i];

              if (isnan(v) || v < TOO_LOW_V || v > TOO_HIGH_V) {
                it[SENSOR_LED_IDX_START + SENSOR_LED_IDX_STEP * i] = blink ? scale(Color(180, 0, 255), sensor_b) : Color(0, 0, 0); // sensor fault: purple blink
                sensor_fault = true;
                continue;
              }

              int abnormal = 0;
              float pct = moisture_pct(v);
              Color c = moisture_color(pct, abnormal);

              if (abnormal) {
                it[SENSOR_LED_IDX_START + SENSOR_LED_IDX_STEP * i] = slow_blink ? scale(c, sensor_b) : Color(0, 0, 0);
                if (abnormal >= 2) critical_dry = true;
              } else {
                it[SENSOR_LED_IDX_START + SENSOR_LED_IDX_STEP * i] = scale(c, breathe * sensor_b);
              }
            }

            bool valve_values[VALVE_COUNT] = {
              id(valve_1).state,
              id(valve_2).state,
              id(valve_3).state,
              id(valve_4).state
            };

            bool valve_active = false;
            for (int i = 0; i < VALVE_COUNT; i++) {
              if (valve_values[i]) {
                it[VALVE_LED_IDX_START + VALVE_LED_IDX_STEP * i] = scale(Color(0, 180, 255), breathe * sensor_b);
                valve_active = true;
              } else {
                it[VALVE_LED_IDX_START + VALVE_LED_IDX_STEP * i] = Color(0, 0, 0);
              }
            }

            bool wifi_ok = id(wifi_rssi).has_state();
            float board_b = id(main_led_brightness).state;
            Color board_led_color = Color(0, 0, 0);
            bool has_board_led_color = false;

            if (id(board_led_show_sensor_status).state) {
              if (critical_dry) {
                board_led_color = blink? scale(Color(180, 20, 30), board_b) : Color(0, 0, 0);  // deep red blink
                has_board_led_color = true;
              } else if (sensor_fault) {
                board_led_color = blink? scale(Color(180, 0, 255), board_b) : Color(0, 0, 0);  // purple blink
                has_board_led_color = true;
              }
            }

            if (!has_board_led_color && id(board_led_show_valve_status).state) {
              if (valve_active) {
                board_led_color = scale(Color(70, 180, 220), breathe * board_b);
                has_board_led_color = true;
              }
            }

            if (!has_board_led_color && !wifi_ok) {
              if (!id(startup_complete))
                board_led_color = blink? scale(Color(90, 220, 110), board_b) : Color(0, 0, 0);  // purple blink
              else
                board_led_color = blink? scale(Color(180, 0, 255), board_b) : Color(0, 0, 0);  // soft green blink
              has_board_led_color = true;
            }

            if (!has_board_led_color)
              board_led_color = scale(Color(80, 120, 255), breathe * board_b);  // royal blue breathing
            it[BOARD_LED_IDX] = board_led_color;

script:
  - id: beep_short
    mode: restart
    then:
      - output.turn_on: beeper_out
      - delay: 80ms
      - output.turn_off: beeper_out

  - id: beep_startup_ok
    mode: restart
    then:
      - output.turn_on: beeper_out
      - delay: 50ms
      - output.turn_off: beeper_out
      - delay: 80ms
      - output.turn_on: beeper_out
      - delay: 80ms
      - output.turn_off: beeper_out

  - id: beep_wifi_failure
    mode: restart
    then:
      - output.turn_on: beeper_out
      - delay: 80ms
      - output.turn_off: beeper_out
      - delay: 120ms
      - output.turn_on: beeper_out
      - delay: 80ms
      - output.turn_off: beeper_out
      - delay: 120ms
      - output.turn_on: beeper_out
      - delay: 80ms
      - output.turn_off: beeper_out
      - delay: 120ms

  - id: beep_dry_warning
    mode: restart
    then:
      - output.turn_on: beeper_out
      - delay: 140ms
      - output.turn_off: beeper_out
      - delay: 200ms
      - output.turn_on: beeper_out
      - delay: 140ms
      - output.turn_off: beeper_out

  - id: beep_critical
    mode: restart
    then:
      - output.turn_on: beeper_out
      - delay: 800ms
      - output.turn_off: beeper_out
      - delay: 200ms
      - output.turn_on: beeper_out
      - delay: 800ms
      - output.turn_off: beeper_out

interval:
  - interval: 3s
    then:
      - if:
          condition:
            lambda: |-
              return id(startup_complete) && id(beeper_enabled).state && !id(wifi_rssi).has_state();
          then:
            - script.execute: beep_wifi_failure

  - interval: 1min
    then:
      - if:
          condition:
            lambda: |-
              if (!id(beeper_enabled).state) return false;
              if (!id(startup_complete)) return false;

              float TOO_HIGH_V = id(sensor_voltage_too_high);
              float TOO_LOW_V = id(sensor_voltage_too_low);

              int SENSOR_PCT_CRITICAL = id(sensor_pct_critical);

              float values[4] = {
                id(sensor_1_v).state,
                id(sensor_2_v).state,
                id(sensor_3_v).state,
                id(sensor_4_v).state
              };

              float DRY_V = id(dry_v).state;
              float WET_v = id(wet_v).state;

              for (int i = 0; i < 4; i++) {
                float v = values[i];

                if (isnan(v) || v < TOO_LOW_V || v > TOO_HIGH_V) continue;

                float pct = (DRY_V - v) / (DRY_V - WET_v) * 100.0;

                if (pct < SENSOR_PCT_CRITICAL) return true;
              }

              return false;
          then:
            - script.execute: beep_dry_warning
